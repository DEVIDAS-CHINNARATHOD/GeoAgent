services:
  - type: web
    name: geoagent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MAPS_API_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
    plan: free
    region: oregon
